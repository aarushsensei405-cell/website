<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Applications — Golden Announcements</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#f0b429;
  --dark:#0d0e11;
  --dark2:#13151a;
  --dark3:#1a1d24;
  --border:rgba(240,180,41,0.2);
  --text:#e8e9ec;
  --text-dim:#8b8fa8;
  --red:#e05252;
  --green:#52e07a;
  --blue:#5294e0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Exo 2',sans-serif;
  background:var(--dark);
  color:var(--text);
}

/* layout */
.page-wrap{max-width:900px;margin:auto;padding:40px 20px}

/* header */
.header{text-align:center;margin-bottom:40px}
.header h1{font-family:Rajdhani;font-size:50px}
.header span{color:var(--gold)}

/* cards */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:30px}

.role-card{
  background:var(--dark2);
  padding:20px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:0.2s;
}

.role-card:hover{transform:translateY(-3px)}
.role-card.selected{border-color:var(--gold)}

/* form */
.form-wrap{display:none;background:var(--dark2);padding:30px;border:1px solid var(--border)}
.form-wrap.visible{display:block}

input,select,textarea{
  width:100%;
  padding:10px;
  background:var(--dark);
  border:1px solid var(--border);
  color:white;
}

/* button */
.btn-submit{
  background:var(--gold);
  padding:12px 25px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.btn-submit.loading{
  opacity:0.6;
  pointer-events:none;
}

/* success */
.success-screen{display:none;text-align:center;padding:40px}
.success-screen.visible{display:block}
</style>
</head>

<body>

<div class="page-wrap">

<div class="header">
  <h1>Staff <span>Applications</span></h1>
</div>

<div class="roles-grid" id="rolesGrid">

  <div class="role-card" data-role="Chat Moderator" data-icon="🛡️" onclick="selectRole(this)">Chat Moderator</div>
  <div class="role-card" data-role="Helper" data-icon="🤝" onclick="selectRole(this)">Helper</div>
  <div class="role-card" data-role="Minecraft Chat Moderator" data-icon="⛏️" onclick="selectRole(this)">Minecraft Chat Mod</div>

</div>

<div class="form-wrap" id="formWrap">

<h2 id="formTitle">Application</h2>

<form id="appForm" onsubmit="submitForm(event)">

<input id="discordUser" placeholder="Discord Username" required>
<br><br>

<input id="age" type="number" placeholder="Age" required>
<br><br>

<select id="timezone" required>
<option disabled selected>Select timezone</option>
<option>UTC+5:30 (India)</option>
</select>
<br><br>

<select id="hours" required>
<option disabled selected>Hours available</option>
<option>1-2</option>
<option>3-4</option>
<option>5+</option>
</select>
<br><br>

<textarea id="why" placeholder="Why this role?" required></textarea>
<br><br>

<textarea id="experience" placeholder="Experience" required></textarea>
<br><br>

<div id="mcBox" style="display:none">
<input id="mcUser" placeholder="Minecraft Username">
<br><br>
</div>

<textarea id="scenario" placeholder="Scenario answer" required></textarea>
<br><br>

<button class="btn-submit" id="submitBtn">Submit</button>

</form>

</div>

<div class="success-screen" id="successScreen">
<h2>Submitted ✔</h2>
<p>We will review your application soon.</p>
</div>

</div>

<script>

let selectedRole = null;

function selectRole(card){

  document.querySelectorAll(".role-card").forEach(c=>c.classList.remove("selected"));
  card.classList.add("selected");

  selectedRole = card.dataset.role;

  document.getElementById("formWrap").classList.add("visible");
  document.getElementById("formTitle").innerText = selectedRole + " Application";

  document.getElementById("mcBox").style.display =
    selectedRole === "Minecraft Chat Moderator" ? "block" : "none";

  document.getElementById("rolesGrid").scrollIntoView({behavior:"smooth"});
}

function submitForm(e){
  e.preventDefault();

  const btn = document.getElementById("submitBtn");

  if(!selectedRole){
    alert("Select a role first!");
    return;
  }

  if(selectedRole === "Minecraft Chat Moderator" && !document.getElementById("mcUser").value){
    alert("Minecraft username required!");
    return;
  }

  btn.classList.add("loading");
  btn.innerText = "Submitting...";

  const data = {
    role:selectedRole,
    discordUser:document.getElementById("discordUser").value,
    age:document.getElementById("age").value,
    timezone:document.getElementById("timezone").value,
    hours:document.getElementById("hours").value,
    why:document.getElementById("why").value,
    experience:document.getElementById("experience").value,
    mcUser:document.getElementById("mcUser").value || "N/A",
    scenario:document.getElementById("scenario").value
  };

  fetch("https://discord-bot1-laji.onrender.com/apply",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  .then(async res=>{
    let text = await res.text();
    try { return JSON.parse(text); }
    catch { return {ok:true}; }
  })
  .then(()=>{

    document.getElementById("formWrap").style.display="none";
    document.getElementById("rolesGrid").style.display="none";
    document.getElementById("successScreen").classList.add("visible");

  })
  .catch(err=>{
    alert("Submission failed!");
    console.error(err);
    btn.classList.remove("loading");
    btn.innerText="Submit";
  });

}

</script>

</body>
</html>
